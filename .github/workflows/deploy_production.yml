name: Deploy Production

on:
  push:
    branches:
      - production
  workflow_dispatch:
    inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'info'
      tags:
        description: 'Description'

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-prod:
    name: Build Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set Up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Set Up GCR
        run: |
          gcloud info
          gcloud auth configure-docker
          export LD_LIBRARY_PATH=/usr/local/lib

      - name: Pull Backend Base Images
        run: |
          docker pull --quiet python:3.7
          docker pull --quiet tiangolo/uvicorn-gunicorn-fastapi:python3.7

      - name: Build and Push Production Backend Image
        run: |
          export LD_LIBRARY_PATH=/usr/local/lib
          docker compose build backend
          docker compose push backend
        env:
          DOCKER_IMAGE_BACKEND: gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend
          DOCKER_IMAGE_CELERYWORKER: gcr.io/${{ secrets.GCP_PROJECT_ID }}/celeryworker
          TAG: prod
          DOMAIN: numerbay.ai

  deploy-prod:
    name: Deploy Production
    needs: build-prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set Up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          export_default_credentials: true

      - name: Set Up GCR
        run: |
          gcloud info
          gcloud auth configure-docker
          export LD_LIBRARY_PATH=/usr/local/lib

      - name: Generate Production Env Files
        run: |
          mkdir -p ops/gcp/env

          cat > ops/gcp/env/backend-api-prod.env <<'EOF'
          SERVER_NAME="numerbay.ai"
          SERVER_HOST="https://numerbay.ai"
          PROJECT_NAME="NumerBay"
          FIRST_SUPERUSER="admin@numerbay.ai"
          SECRET_KEY="${{ secrets.APP_SECRET_KEY }}"
          FIRST_SUPERUSER_PASSWORD="${{ secrets.APP_FIRST_SUPERUSER_PASSWORD }}"
          POSTGRES_SERVER="${{ secrets.APP_POSTGRES_SERVER }}"
          POSTGRES_USER="${{ secrets.APP_POSTGRES_USER }}"
          POSTGRES_PASSWORD="${{ secrets.APP_POSTGRES_PASSWORD }}"
          POSTGRES_DB="${{ secrets.APP_POSTGRES_DB }}"
          SQLALCHEMY_POOL_SIZE="5"
          SQLALCHEMY_MAX_OVERFLOW="5"
          SQLALCHEMY_POOL_TIMEOUT="60"
          SQLALCHEMY_POOL_PRE_PING="True"
          SMTP_TLS="True"
          SMTP_PORT="587"
          SMTP_HOST=""
          SMTP_USER=""
          SMTP_PASSWORD=""
          MAILGUN_DOMAIN_NAME="numerbay.ai"
          MAILGUN_API_KEY="${{ secrets.APP_MAILGUN_API_KEY }}"
          EMAILS_FROM_EMAIL="admin@numerbay.ai"
          GCP_PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          GCP_STORAGE_BUCKET="storage.numerbay.ai"
          GCP_SERVICE_ACCOUNT_INFO='${{ secrets.APP_GCP_SERVICE_ACCOUNT_INFO }}'
          GCP_WEBHOOK_FUNCTION="${{ secrets.APP_GCP_WEBHOOK_FUNCTION }}"
          GCP_TASKS_LOCATION="us-central1"
          GCP_TASKS_QUEUE_NOTIFICATIONS="numerbay-queue-notifications"
          GCP_TASKS_QUEUE_OPS="numerbay-queue-ops"
          GCP_TASKS_QUEUE_WEBHOOKS="numerbay-queue-webhooks"
          GCP_TASKS_QUEUE_PAYMENTS="numerbay-queue-payments"
          GCP_TASKS_QUEUE_SUBMISSIONS="numerbay-queue-submissions"
          ASYNC_WORKER_DISPATCH_URL="${{ secrets.ASYNC_WORKER_DISPATCH_URL }}"
          ASYNC_WORKER_DISPATCH_TOKEN="${{ secrets.ASYNC_WORKER_DISPATCH_TOKEN }}"
          ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL=""
          INFURA_PROJECT_ID="${{ secrets.APP_INFURA_PROJECT_ID }}"
          SENTRY_DSN="${{ secrets.APP_SENTRY_DSN }}"
          WEBHOOK_ENABLED="True"
          ASYNC_OWNER_NOTIFICATIONS="${{ secrets.ASYNC_OWNER_NOTIFICATIONS }}"
          ASYNC_OWNER_OPS="${{ secrets.ASYNC_OWNER_OPS }}"
          ASYNC_OWNER_WEBHOOKS="${{ secrets.ASYNC_OWNER_WEBHOOKS }}"
          ASYNC_OWNER_PAYMENTS="${{ secrets.ASYNC_OWNER_PAYMENTS }}"
          ASYNC_OWNER_SUBMISSIONS="${{ secrets.ASYNC_OWNER_SUBMISSIONS }}"
          SCHEDULER_OWNER_GLOBALS_STATS="${{ secrets.SCHEDULER_OWNER_GLOBALS_STATS }}"
          SCHEDULER_OWNER_STAKE_SNAPSHOTS="${{ secrets.SCHEDULER_OWNER_STAKE_SNAPSHOTS }}"
          SCHEDULER_OWNER_PRODUCT_SALES_STATS="${{ secrets.SCHEDULER_OWNER_PRODUCT_SALES_STATS }}"
          SCHEDULER_OWNER_POLLS="${{ secrets.SCHEDULER_OWNER_POLLS }}"
          SCHEDULER_OWNER_PRUNE_STORAGE="${{ secrets.SCHEDULER_OWNER_PRUNE_STORAGE }}"
          SCHEDULER_OWNER_ARTIFACT_REMINDERS="${{ secrets.SCHEDULER_OWNER_ARTIFACT_REMINDERS }}"
          SCHEDULER_OWNER_MODEL_SCORES="${{ secrets.SCHEDULER_OWNER_MODEL_SCORES }}"
          SCHEDULER_OWNER_ACTIVE_ROUND="${{ secrets.SCHEDULER_OWNER_ACTIVE_ROUND }}"
          WEB_CONCURRENCY="1"
          TIMEOUT="0"
          EOF

          cat > ops/gcp/env/backend-worker-prod.env <<'EOF'
          SERVER_NAME="numerbay.ai"
          SERVER_HOST="https://numerbay.ai"
          PROJECT_NAME="NumerBay"
          FIRST_SUPERUSER="admin@numerbay.ai"
          SECRET_KEY="${{ secrets.APP_SECRET_KEY }}"
          FIRST_SUPERUSER_PASSWORD="${{ secrets.APP_FIRST_SUPERUSER_PASSWORD }}"
          POSTGRES_SERVER="${{ secrets.APP_POSTGRES_SERVER }}"
          POSTGRES_USER="${{ secrets.APP_POSTGRES_USER }}"
          POSTGRES_PASSWORD="${{ secrets.APP_POSTGRES_PASSWORD }}"
          POSTGRES_DB="${{ secrets.APP_POSTGRES_DB }}"
          SQLALCHEMY_POOL_SIZE="5"
          SQLALCHEMY_MAX_OVERFLOW="5"
          SQLALCHEMY_POOL_TIMEOUT="60"
          SQLALCHEMY_POOL_PRE_PING="True"
          SMTP_TLS="True"
          SMTP_PORT="587"
          SMTP_HOST=""
          SMTP_USER=""
          SMTP_PASSWORD=""
          MAILGUN_DOMAIN_NAME="numerbay.ai"
          MAILGUN_API_KEY="${{ secrets.APP_MAILGUN_API_KEY }}"
          EMAILS_FROM_EMAIL="admin@numerbay.ai"
          GCP_PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          GCP_STORAGE_BUCKET="storage.numerbay.ai"
          GCP_SERVICE_ACCOUNT_INFO='${{ secrets.APP_GCP_SERVICE_ACCOUNT_INFO }}'
          GCP_WEBHOOK_FUNCTION="${{ secrets.APP_GCP_WEBHOOK_FUNCTION }}"
          INFURA_PROJECT_ID="${{ secrets.APP_INFURA_PROJECT_ID }}"
          SENTRY_DSN="${{ secrets.APP_SENTRY_DSN }}"
          WEBHOOK_ENABLED="True"
          SCHEDULER_OWNER_GLOBALS_STATS="${{ secrets.SCHEDULER_OWNER_GLOBALS_STATS }}"
          SCHEDULER_OWNER_STAKE_SNAPSHOTS="${{ secrets.SCHEDULER_OWNER_STAKE_SNAPSHOTS }}"
          SCHEDULER_OWNER_PRODUCT_SALES_STATS="${{ secrets.SCHEDULER_OWNER_PRODUCT_SALES_STATS }}"
          SCHEDULER_OWNER_POLLS="${{ secrets.SCHEDULER_OWNER_POLLS }}"
          SCHEDULER_OWNER_PRUNE_STORAGE="${{ secrets.SCHEDULER_OWNER_PRUNE_STORAGE }}"
          SCHEDULER_OWNER_ARTIFACT_REMINDERS="${{ secrets.SCHEDULER_OWNER_ARTIFACT_REMINDERS }}"
          SCHEDULER_OWNER_MODEL_SCORES="${{ secrets.SCHEDULER_OWNER_MODEL_SCORES }}"
          SCHEDULER_OWNER_ACTIVE_ROUND="${{ secrets.SCHEDULER_OWNER_ACTIVE_ROUND }}"
          GCP_TASKS_LOCATION="us-central1"
          GCP_TASKS_QUEUE_NOTIFICATIONS="numerbay-queue-notifications"
          GCP_TASKS_QUEUE_OPS="numerbay-queue-ops"
          GCP_TASKS_QUEUE_WEBHOOKS="numerbay-queue-webhooks"
          GCP_TASKS_QUEUE_PAYMENTS="numerbay-queue-payments"
          GCP_TASKS_QUEUE_SUBMISSIONS="numerbay-queue-submissions"
          ASYNC_WORKER_DISPATCH_URL="${{ secrets.ASYNC_WORKER_DISPATCH_URL }}"
          ASYNC_WORKER_DISPATCH_TOKEN="${{ secrets.ASYNC_WORKER_DISPATCH_TOKEN }}"
          ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL=""
          ASYNC_OWNER_NOTIFICATIONS="${{ secrets.ASYNC_OWNER_NOTIFICATIONS }}"
          ASYNC_OWNER_OPS="${{ secrets.ASYNC_OWNER_OPS }}"
          ASYNC_OWNER_WEBHOOKS="${{ secrets.ASYNC_OWNER_WEBHOOKS }}"
          ASYNC_OWNER_PAYMENTS="${{ secrets.ASYNC_OWNER_PAYMENTS }}"
          ASYNC_OWNER_SUBMISSIONS="${{ secrets.ASYNC_OWNER_SUBMISSIONS }}"
          WEB_CONCURRENCY="1"
          TIMEOUT="0"
          EOF

          cat > ops/gcp/env/backend-jobs-prod.env <<'EOF'
          SERVER_NAME="numerbay.ai"
          SERVER_HOST="https://numerbay.ai"
          PROJECT_NAME="NumerBay"
          FIRST_SUPERUSER="admin@numerbay.ai"
          SECRET_KEY="${{ secrets.APP_SECRET_KEY }}"
          FIRST_SUPERUSER_PASSWORD="${{ secrets.APP_FIRST_SUPERUSER_PASSWORD }}"
          POSTGRES_SERVER="${{ secrets.APP_POSTGRES_SERVER }}"
          POSTGRES_USER="${{ secrets.APP_POSTGRES_USER }}"
          POSTGRES_PASSWORD="${{ secrets.APP_POSTGRES_PASSWORD }}"
          POSTGRES_DB="${{ secrets.APP_POSTGRES_DB }}"
          SMTP_TLS="True"
          SMTP_PORT="587"
          SMTP_HOST=""
          SMTP_USER=""
          SMTP_PASSWORD=""
          MAILGUN_DOMAIN_NAME="numerbay.ai"
          MAILGUN_API_KEY="${{ secrets.APP_MAILGUN_API_KEY }}"
          EMAILS_FROM_EMAIL="admin@numerbay.ai"
          GCP_PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          GCP_STORAGE_BUCKET="storage.numerbay.ai"
          GCP_SERVICE_ACCOUNT_INFO='${{ secrets.APP_GCP_SERVICE_ACCOUNT_INFO }}'
          GCP_WEBHOOK_FUNCTION="${{ secrets.APP_GCP_WEBHOOK_FUNCTION }}"
          INFURA_PROJECT_ID="${{ secrets.APP_INFURA_PROJECT_ID }}"
          SENTRY_DSN="${{ secrets.APP_SENTRY_DSN }}"
          WEBHOOK_ENABLED="True"
          SCHEDULER_OWNER_GLOBALS_STATS="${{ secrets.SCHEDULER_OWNER_GLOBALS_STATS }}"
          SCHEDULER_OWNER_STAKE_SNAPSHOTS="${{ secrets.SCHEDULER_OWNER_STAKE_SNAPSHOTS }}"
          SCHEDULER_OWNER_PRODUCT_SALES_STATS="${{ secrets.SCHEDULER_OWNER_PRODUCT_SALES_STATS }}"
          SCHEDULER_OWNER_POLLS="${{ secrets.SCHEDULER_OWNER_POLLS }}"
          SCHEDULER_OWNER_PRUNE_STORAGE="${{ secrets.SCHEDULER_OWNER_PRUNE_STORAGE }}"
          SCHEDULER_OWNER_ARTIFACT_REMINDERS="${{ secrets.SCHEDULER_OWNER_ARTIFACT_REMINDERS }}"
          SCHEDULER_OWNER_MODEL_SCORES="${{ secrets.SCHEDULER_OWNER_MODEL_SCORES }}"
          SCHEDULER_OWNER_ACTIVE_ROUND="${{ secrets.SCHEDULER_OWNER_ACTIVE_ROUND }}"
          EOF

      - name: Bootstrap Production DB
        run: |
          export PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          export REGION=us-central1
          export IMAGE="gcr.io/${PROJECT_ID}/backend:prod"

          gcloud run jobs deploy numerbay-job-bootstrap-db \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --network numerbay \
            --subnet numerbay \
            --vpc-egress private-ranges-only \
            --tasks 1 \
            --parallelism 1 \
            --max-retries 0 \
            --task-timeout 900s \
            --command bash \
            --args=/app/bootstrap-db.sh \
            --env-vars-file ops/gcp/env/backend-jobs-prod.env

          gcloud run jobs execute numerbay-job-bootstrap-db \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --wait

      - name: Deploy Production Services and Jobs
        run: |
          export PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"
          export REGION=us-central1
          export IMAGE="gcr.io/${PROJECT_ID}/backend:prod"

          PROJECT_ID="$PROJECT_ID" REGION="$REGION" SERVICE_NAME=numerbay-api IMAGE="$IMAGE" \
          ENV_FILE=ops/gcp/env/backend-api-prod.env ./ops/gcp/deploy_backend_api.sh

          gcloud run deploy numerbay-worker \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --network numerbay \
            --subnet numerbay \
            --vpc-egress private-ranges-only \
            --ingress internal \
            --allow-unauthenticated \
            --memory 1Gi \
            --timeout 900s \
            --concurrency 1 \
            --min-instances 1 \
            --max-instances 3 \
            --env-vars-file ops/gcp/env/backend-worker-prod.env

          deploy_job() {
            local job_name="$1"
            local logical_name="$2"
            local env_file="$3"

            gcloud run jobs deploy "$job_name" \
              --project "$PROJECT_ID" \
              --region "$REGION" \
              --image "$IMAGE" \
              --network numerbay \
              --subnet numerbay \
              --vpc-egress private-ranges-only \
              --tasks 1 \
              --parallelism 1 \
              --max-retries 0 \
              --task-timeout 600s \
              --command python \
              --args=-m,app.ops.jobs,run,"$logical_name" \
              --env-vars-file "$env_file"
          }

          deploy_job numerbay-job-globals-stats globals-stats ops/gcp/env/backend-jobs-prod.env
          deploy_job numerbay-job-polls polls ops/gcp/env/backend-jobs-prod.env
          deploy_job numerbay-job-product-sales-stats product-sales-stats ops/gcp/env/backend-jobs-prod.env
          deploy_job numerbay-job-prune-storage prune-storage ops/gcp/env/backend-jobs-prod.env
          deploy_job numerbay-job-stake-snapshots stake-snapshots ops/gcp/env/backend-jobs-prod.env
          deploy_job numerbay-job-artifact-reminders artifact-reminders ops/gcp/env/backend-worker-prod.env
