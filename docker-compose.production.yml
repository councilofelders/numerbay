version: "3.6"
services:

  proxy:
    image: traefik:v2.2
    networks:
      - ${TRAEFIK_PUBLIC_NETWORK?Variable not set}
      - default
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --providers.docker
      - --providers.docker.constraints=Label(`traefik.constraint-label-stack`, `${TRAEFIK_TAG?Variable not set}`)
      - --providers.docker.exposedbydefault=false
      - --providers.docker.swarmmode
      - --accesslog
      - --log
      - --api
    deploy:
      placement:
        constraints:
          - node.role == manager
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK?Variable not set}
        - traefik.constraint-label=${TRAEFIK_PUBLIC_TAG?Variable not set}
        - traefik.http.middlewares.${STACK_NAME?Variable not set}-https-redirect.redirectscheme.scheme=https
        - traefik.http.middlewares.${STACK_NAME?Variable not set}-https-redirect.redirectscheme.permanent=true
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-http.rule=Host(`${DOMAIN?Variable not set}`) || Host(`www.${DOMAIN?Variable not set}`)
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-http.entrypoints=http
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-https.rule=Host(`${DOMAIN?Variable not set}`) || Host(`www.${DOMAIN?Variable not set}`)
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-https.entrypoints=https
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-https.tls=true
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-https.tls.certresolver=le
        - traefik.http.services.${STACK_NAME?Variable not set}-proxy.loadbalancer.server.port=80
        - traefik.http.middlewares.${STACK_NAME?Variable not set}-www-redirect.redirectregex.regex=^https?://(www.)?(${DOMAIN?Variable not set})/(.*)
        - traefik.http.middlewares.${STACK_NAME?Variable not set}-www-redirect.redirectregex.replacement=https://${DOMAIN?Variable not set}/$${3}
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-https.middlewares=${STACK_NAME?Variable not set}-www-redirect
        - traefik.http.routers.${STACK_NAME?Variable not set}-proxy-http.middlewares=${STACK_NAME?Variable not set}-www-redirect,${STACK_NAME?Variable not set}-https-redirect

  queue:
    image: rabbitmq:3

  flower:
    image: mher/flower:0.9.5
    networks:
      - ${TRAEFIK_PUBLIC_NETWORK?Variable not set}
      - default
    env_file:
      - .env
    command:
      - "--broker=amqp://guest@queue:5672//"
    deploy:
      labels:
        - traefik.enable=true
        - traefik.docker.network=${TRAEFIK_PUBLIC_NETWORK?Variable not set}
        - traefik.constraint-label=${TRAEFIK_PUBLIC_TAG?Variable not set}
        - traefik.http.routers.${STACK_NAME?Variable not set}-flower-http.rule=Host(`flower.${DOMAIN?Variable not set}`)
        - traefik.http.routers.${STACK_NAME?Variable not set}-flower-http.entrypoints=http
        - traefik.http.routers.${STACK_NAME?Variable not set}-flower-http.middlewares=${STACK_NAME?Variable not set}-https-redirect
        - traefik.http.routers.${STACK_NAME?Variable not set}-flower-https.rule=Host(`flower.${DOMAIN?Variable not set}`)
        - traefik.http.routers.${STACK_NAME?Variable not set}-flower-https.entrypoints=https
        - traefik.http.routers.${STACK_NAME?Variable not set}-flower-https.tls=true
        - traefik.http.routers.${STACK_NAME?Variable not set}-flower-https.tls.certresolver=le
        - traefik.http.services.${STACK_NAME?Variable not set}-flower.loadbalancer.server.port=5555

  backend:
    image: '${DOCKER_IMAGE_BACKEND?Variable not set}:${TAG-latest}'
    env_file:
      - .env
    environment:
      - SERVER_NAME=${DOMAIN?Variable not set}
      - SERVER_HOST=https://${DOMAIN?Variable not set}
      - RUN_DB_MIGRATIONS_ON_STARTUP=${RUN_DB_MIGRATIONS_ON_STARTUP-false}
      - RUN_INIT_DATA_ON_STARTUP=${RUN_INIT_DATA_ON_STARTUP-false}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - GCP_PROJECT=${GCP_PROJECT}
      - GCP_STORAGE_BUCKET=${GCP_STORAGE_BUCKET}
      - GCP_SERVICE_ACCOUNT_INFO=${GCP_SERVICE_ACCOUNT_INFO}
      - GCP_WEBHOOK_FUNCTION=${GCP_WEBHOOK_FUNCTION}
      - GCP_TASKS_LOCATION=${GCP_TASKS_LOCATION-us-central1}
      - GCP_TASKS_QUEUE_NOTIFICATIONS=${GCP_TASKS_QUEUE_NOTIFICATIONS-notifications}
      - GCP_TASKS_QUEUE_OPS=${GCP_TASKS_QUEUE_OPS-ops}
      - GCP_TASKS_QUEUE_WEBHOOKS=${GCP_TASKS_QUEUE_WEBHOOKS-webhooks}
      - GCP_TASKS_QUEUE_PAYMENTS=${GCP_TASKS_QUEUE_PAYMENTS-payments}
      - GCP_TASKS_QUEUE_SUBMISSIONS=${GCP_TASKS_QUEUE_SUBMISSIONS-submissions}
      - ASYNC_WORKER_DISPATCH_URL=${ASYNC_WORKER_DISPATCH_URL-}
      - ASYNC_WORKER_DISPATCH_TOKEN=${ASYNC_WORKER_DISPATCH_TOKEN-}
      - ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL=${ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL-}
      - ASYNC_OWNER_NOTIFICATIONS=${ASYNC_OWNER_NOTIFICATIONS-celery}
      - ASYNC_OWNER_OPS=${ASYNC_OWNER_OPS-celery}
      - ASYNC_OWNER_WEBHOOKS=${ASYNC_OWNER_WEBHOOKS-celery}
      - ASYNC_OWNER_PAYMENTS=${ASYNC_OWNER_PAYMENTS-celery}
      - ASYNC_OWNER_SUBMISSIONS=${ASYNC_OWNER_SUBMISSIONS-celery}
      - INFURA_PROJECT_ID=${INFURA_PROJECT_ID}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED}
    deploy:
      labels:
        - traefik.enable=true
        - traefik.constraint-label-stack=${TRAEFIK_TAG?Variable not set}
        - traefik.http.routers.${STACK_NAME?Variable not set}-backend-http.rule=PathPrefix(`/backend-api`) || PathPrefix(`/docs`) || PathPrefix(`/redoc`)
        - traefik.http.services.${STACK_NAME?Variable not set}-backend.loadbalancer.server.port=80

  celeryworker:
    image: '${DOCKER_IMAGE_CELERYWORKER?Variable not set}:${TAG-latest}'
    env_file:
      - .env
    environment:
      - SERVER_NAME=${DOMAIN?Variable not set}
      - SERVER_HOST=https://${DOMAIN?Variable not set}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - GCP_PROJECT=${GCP_PROJECT}
      - GCP_STORAGE_BUCKET=${GCP_STORAGE_BUCKET}
      - GCP_SERVICE_ACCOUNT_INFO=${GCP_SERVICE_ACCOUNT_INFO}
      - GCP_WEBHOOK_FUNCTION=${GCP_WEBHOOK_FUNCTION}
      - GCP_TASKS_LOCATION=${GCP_TASKS_LOCATION-us-central1}
      - GCP_TASKS_QUEUE_NOTIFICATIONS=${GCP_TASKS_QUEUE_NOTIFICATIONS-notifications}
      - GCP_TASKS_QUEUE_OPS=${GCP_TASKS_QUEUE_OPS-ops}
      - GCP_TASKS_QUEUE_WEBHOOKS=${GCP_TASKS_QUEUE_WEBHOOKS-webhooks}
      - GCP_TASKS_QUEUE_PAYMENTS=${GCP_TASKS_QUEUE_PAYMENTS-payments}
      - GCP_TASKS_QUEUE_SUBMISSIONS=${GCP_TASKS_QUEUE_SUBMISSIONS-submissions}
      - ASYNC_WORKER_DISPATCH_URL=${ASYNC_WORKER_DISPATCH_URL-}
      - ASYNC_WORKER_DISPATCH_TOKEN=${ASYNC_WORKER_DISPATCH_TOKEN-}
      - ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL=${ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL-}
      - ASYNC_OWNER_NOTIFICATIONS=${ASYNC_OWNER_NOTIFICATIONS-celery}
      - ASYNC_OWNER_OPS=${ASYNC_OWNER_OPS-celery}
      - ASYNC_OWNER_WEBHOOKS=${ASYNC_OWNER_WEBHOOKS-celery}
      - ASYNC_OWNER_PAYMENTS=${ASYNC_OWNER_PAYMENTS-celery}
      - ASYNC_OWNER_SUBMISSIONS=${ASYNC_OWNER_SUBMISSIONS-celery}
      - INFURA_PROJECT_ID=${INFURA_PROJECT_ID}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED}
    command: bash -c "python /app/app/celeryworker_pre_start.py && celery -A app.worker worker -l info -Q main-queue,beat-queue -P eventlet -c 100"

  celerybeat:
    image: '${DOCKER_IMAGE_CELERYWORKER?Variable not set}:${TAG-latest}'
    env_file:
      - .env
    environment:
      - SERVER_NAME=${DOMAIN?Variable not set}
      - SERVER_HOST=https://${DOMAIN?Variable not set}
      - SCHEDULER_OWNER_GLOBALS_STATS=${SCHEDULER_OWNER_GLOBALS_STATS-celery}
      - SCHEDULER_OWNER_STAKE_SNAPSHOTS=${SCHEDULER_OWNER_STAKE_SNAPSHOTS-celery}
      - SCHEDULER_OWNER_PRODUCT_SALES_STATS=${SCHEDULER_OWNER_PRODUCT_SALES_STATS-celery}
      - SCHEDULER_OWNER_POLLS=${SCHEDULER_OWNER_POLLS-celery}
      - SCHEDULER_OWNER_PRUNE_STORAGE=${SCHEDULER_OWNER_PRUNE_STORAGE-celery}
      - SCHEDULER_OWNER_ARTIFACT_REMINDERS=${SCHEDULER_OWNER_ARTIFACT_REMINDERS-celery}
      - SCHEDULER_OWNER_MODEL_SCORES=${SCHEDULER_OWNER_MODEL_SCORES-celery}
      - SCHEDULER_OWNER_ACTIVE_ROUND=${SCHEDULER_OWNER_ACTIVE_ROUND-celery}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - MAILGUN_API_KEY=${MAILGUN_API_KEY}
      - GCP_PROJECT=${GCP_PROJECT}
      - GCP_STORAGE_BUCKET=${GCP_STORAGE_BUCKET}
      - GCP_SERVICE_ACCOUNT_INFO=${GCP_SERVICE_ACCOUNT_INFO}
      - GCP_WEBHOOK_FUNCTION=${GCP_WEBHOOK_FUNCTION}
      - GCP_TASKS_LOCATION=${GCP_TASKS_LOCATION-us-central1}
      - GCP_TASKS_QUEUE_NOTIFICATIONS=${GCP_TASKS_QUEUE_NOTIFICATIONS-notifications}
      - GCP_TASKS_QUEUE_OPS=${GCP_TASKS_QUEUE_OPS-ops}
      - GCP_TASKS_QUEUE_WEBHOOKS=${GCP_TASKS_QUEUE_WEBHOOKS-webhooks}
      - GCP_TASKS_QUEUE_PAYMENTS=${GCP_TASKS_QUEUE_PAYMENTS-payments}
      - GCP_TASKS_QUEUE_SUBMISSIONS=${GCP_TASKS_QUEUE_SUBMISSIONS-submissions}
      - ASYNC_WORKER_DISPATCH_URL=${ASYNC_WORKER_DISPATCH_URL-}
      - ASYNC_WORKER_DISPATCH_TOKEN=${ASYNC_WORKER_DISPATCH_TOKEN-}
      - ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL=${ASYNC_WORKER_SERVICE_ACCOUNT_EMAIL-}
      - ASYNC_OWNER_NOTIFICATIONS=${ASYNC_OWNER_NOTIFICATIONS-celery}
      - ASYNC_OWNER_OPS=${ASYNC_OWNER_OPS-celery}
      - ASYNC_OWNER_WEBHOOKS=${ASYNC_OWNER_WEBHOOKS-celery}
      - ASYNC_OWNER_PAYMENTS=${ASYNC_OWNER_PAYMENTS-celery}
      - ASYNC_OWNER_SUBMISSIONS=${ASYNC_OWNER_SUBMISSIONS-celery}
      - INFURA_PROJECT_ID=${INFURA_PROJECT_ID}
      - WEBHOOK_ENABLED=${WEBHOOK_ENABLED}
    command: bash -c "python /app/app/celeryworker_pre_start.py && celery -A app.worker beat -l info -s /tmp/celerybeat-schedule --pidfile /tmp/celerybeat.pid"

networks:
  traefik-public:
    external: ${TRAEFIK_PUBLIC_NETWORK_IS_EXTERNAL-true}
